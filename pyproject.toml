[build-system]
requires = [
    "scikit-build-core","numpy","eigenpy","eigen","sphinx","sphinxcontrib.bibtex"
]

build-backend = "scikit_build_core.build"


[project]

name = "bertini"
version = "1.0.5"

requires-python = ">= 3.13"
readme = "python/README.rst"

dependencies = ["numpy","eigenpy"]


authors = [
    {name="Bertini Team"}
]

maintainers=[
    {name="silviana amethyst", email="amethyst@mpi-cbg.de"}
]


description = "Software for numerical algebraic geometry"

[project.optional-dependencies]
test = ["pytest"]




[tool.scikit-build]
wheel.packages = ["python/bertini"]
wheel.expand-macos-universal-tags = true
wheel.install-dir = "bertini"

build-dir = "build/{wheel_tag}"




[project.urls]

Repository = "https://github.com/bertiniteam/b2"
