name: CI Build & Test

on:
  push:
    branches: [develop, 'refactor/**']
  pull_request:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Cache Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        id: linux-deps-cache
        with:
          path: .b2-linux-deps
          key: linux-deps-boost1.90.0-eigenpy3.11.0-v1

      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget gmp-devel mpfr-devel libmpc-devel eigen3-devel libtool &&
            pip3 install scikit-build-core numpy scipy &&
            if [ -d /project/.b2-linux-deps/boost ]; then
              echo "Restoring cached Boost and eigenpy" &&
              cp -a /project/.b2-linux-deps/boost/include/. /usr/local/include/ &&
              cp -a /project/.b2-linux-deps/boost/lib/. /usr/local/lib/ &&
              cp -a /project/.b2-linux-deps/eigenpy/include/. /usr/local/include/ &&
              cp -a /project/.b2-linux-deps/eigenpy/lib/. /usr/local/lib/ &&
              cp -a /project/.b2-linux-deps/eigenpy/lib64/. /usr/local/lib64/ 2>/dev/null || true &&
              ldconfig;
            else
              echo "Building Boost from source" &&
              cd /tmp &&
              wget -q https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.bz2 &&
              bunzip2 boost_1_90_0.tar.bz2 && tar xf boost_1_90_0.tar && cd boost_1_90_0 &&
              ./bootstrap.sh --prefix=/usr/local --with-python=$(which python3) &&
              ./b2 install -j$(nproc) &&
              echo "Building eigenpy from source" &&
              cd /tmp &&
              wget -q https://github.com/stack-of-tasks/eigenpy/releases/download/v3.11.0/eigenpy-3.11.0.tar.gz &&
              tar zxf eigenpy-3.11.0.tar.gz && cd eigenpy-3.11.0 && mkdir -p bld && cd bld &&
              cmake .. -DCMAKE_PREFIX_PATH=/usr/local -DCMAKE_INSTALL_PREFIX=/usr/local -DPython3_EXECUTABLE=$(which python3) -DPython3_NumPy_INCLUDE_DIR=$(python3 -c "import numpy; print(numpy.get_include())") &&
              make -j$(nproc) install &&
              echo "Saving to cache" &&
              mkdir -p /project/.b2-linux-deps/boost/include /project/.b2-linux-deps/boost/lib/cmake &&
              cp -a /usr/local/include/boost /project/.b2-linux-deps/boost/include/ &&
              cp -a /usr/local/lib/libboost_* /project/.b2-linux-deps/boost/lib/ &&
              cp -a /usr/local/lib/cmake/Boost* /project/.b2-linux-deps/boost/lib/cmake/ 2>/dev/null || true &&
              cp -a /usr/local/lib/cmake/boost_* /project/.b2-linux-deps/boost/lib/cmake/ 2>/dev/null || true &&
              mkdir -p /project/.b2-linux-deps/eigenpy/include /project/.b2-linux-deps/eigenpy/lib /project/.b2-linux-deps/eigenpy/lib64 &&
              cp -a /usr/local/include/eigenpy /project/.b2-linux-deps/eigenpy/include/ &&
              cp -a /usr/local/lib/libeigenpy* /project/.b2-linux-deps/eigenpy/lib/ 2>/dev/null || true &&
              cp -a /usr/local/lib64/libeigenpy* /project/.b2-linux-deps/eigenpy/lib64/ 2>/dev/null || true &&
              cp -a /usr/local/lib/cmake/eigenpy /project/.b2-linux-deps/eigenpy/lib/cmake/ 2>/dev/null || true;
            fi
          CIBW_BEFORE_ALL_MACOS: >
            brew install gmp mpfr libmpc eigen@3 eigenpy boost boost-python3
          CIBW_BEFORE_BUILD: "pip install scikit-build-core numpy"
          CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH=/usr/local/lib64:$LD_LIBRARY_PATH"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=14.0"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_windows:
    name: Build wheel on windows-${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: b2-windows
          environment-file: environment-win.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
      - name: Build Windows
        shell: pwsh
        run: |
          conda info
          conda list

          $env:CC='clang-cl'
          $env:CXX='clang-cl'
          $env:CMAKE_GENERATOR='Ninja'
          $env:CMAKE_PREFIX_PATH="$env:CONDA_PREFIX\Library"

          # Patch boost header to fix clang-cl linker error
          $boostHeader = "$env:CONDA_PREFIX\Library\include\boost\archive\archive_exception.hpp"
          (Get-Content $boostHeader).Replace('public virtual std::exception', 'public std::exception') | Set-Content $boostHeader

          cd ${{github.workspace}}
          pip install build delvewheel
          python -m build --wheel --no-isolation

          # Bundle all dependent DLLs (boost, gmp, eigenpy, etc.) into the wheel
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          delvewheel repair $wheel.FullName -w repaired/ --add-path "$env:CONDA_PREFIX\Library\bin"
          Remove-Item dist/*.whl
          Move-Item repaired/*.whl dist/
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: ./dist/*.whl

  test_wheels:
    name: Test wheel on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs:
      - build_wheels
      - build_windows
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.11'
          - os: macos-14
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.12'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Install wheel
        shell: bash
        run: |
          pip install --find-links dist/ pybertini
          pip install pytest numpy

      - name: Run Python tests
        shell: bash
        run: |
          cd python/test
          python -m pytest -v --tb=short
