name: Publish wheels 🐍 and deploy documentation 📝

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+.dev[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+a[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+b[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_version:
    name: Check pyproject.toml version matches tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v5
      - name: Check version matches tag
        id: check
        run: |
          TAG="$GITHUB_REF_NAME"
          # Validate tag is a well-formed PEP 440 version tag
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(\.dev[0-9]+|a[0-9]+|b[0-9]+|rc[0-9]+)?$'; then
            echo "Error: tag '$TAG' is not a valid PEP 440 version tag (e.g. v1.2.3, v1.2.3.dev1, v1.2.3rc1)"
            exit 1
          fi
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Error: tag '$TAG' does not match pyproject.toml version '$PYPROJECT_VERSION'"
            exit 1
          fi
          echo "OK: tag '$TAG' matches pyproject.toml version '$PYPROJECT_VERSION'"
          echo "$TAG" | grep -Eq '\.(dev|a|b|rc)[0-9]+$' && echo "is_prerelease=true" >> $GITHUB_OUTPUT || echo "is_prerelease=false" >> $GITHUB_OUTPUT

  build_and_test:
    name: Build and test
    needs: check_version
    uses: ./.github/workflows/build_and_test.yml

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: needs.check_version.outputs.is_prerelease == 'true'
    needs: [check_version, build_and_test]
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/bertini2

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist/
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    if: needs.check_version.outputs.is_prerelease == 'false'
    needs: [check_version, build_and_test]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/bertini2

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    if: needs.check_version.outputs.is_prerelease == 'false'
    needs:
      - check_version
      - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist/

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.whl

      - name: Get Newest Changelog
        run: |
          python -c 'import re; from pathlib import Path; text=re.sub("<!--(.*?)-->", "", (Path.cwd() / "CHANGELOG.md").read_text(), flags=re.DOTALL); print(text); start=text.find("_" * 79); (Path.cwd() / "TEMP_CHANGELOG.md").write_text(text[start:text.find("_" * 79, start+1)])'

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: ./TEMP_CHANGELOG.md
          files: |
            dist/*.*

  build_and_deploy_docs:
    name: Build and deploy docs
    if: needs.check_version.outputs.is_prerelease == 'false'
    needs: [check_version, build_and_test]
    uses: ./.github/workflows/build_docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write