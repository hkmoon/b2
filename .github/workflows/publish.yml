name: Publish wheels 🐍 and deploy documentation 📝

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+.dev[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+a[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+b[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_version:
    name: Check pyproject.toml version matches tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v5
      - name: Check version matches tag
        id: check
        run: |
          TAG="$GITHUB_REF_NAME"
          # Validate tag is a well-formed PEP 440 version tag
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(\.dev[0-9]+|a[0-9]+|b[0-9]+|rc[0-9]+)?$'; then
            echo "Error: tag '$TAG' is not a valid PEP 440 version tag (e.g. v1.2.3, v1.2.3.dev1, v1.2.3rc1)"
            exit 1
          fi
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Error: tag '$TAG' does not match pyproject.toml version '$PYPROJECT_VERSION'"
            exit 1
          fi
          echo "OK: tag '$TAG' matches pyproject.toml version '$PYPROJECT_VERSION'"
          echo "$TAG" | grep -Eq '\.(dev|a|b|rc)[0-9]+$' && echo "is_prerelease=true" >> $GITHUB_OUTPUT || echo "is_prerelease=false" >> $GITHUB_OUTPUT

  build_and_test:
    name: Build and test
    needs: check_version
    uses: ./.github/workflows/build_and_test.yml

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: needs.check_version.outputs.is_prerelease == 'true'
    needs: [check_version, build_and_test]
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/bertini2

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist/
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    if: needs.check_version.outputs.is_prerelease == 'false'
    needs: [check_version, build_and_test]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/bertini2

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    if: needs.check_version.outputs.is_prerelease == 'false'
    needs:
      - check_version
      - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist/

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.whl

      - name: Get Newest Changelog
        run: |
          python -c 'import re; from pathlib import Path; text=re.sub("<!--(.*?)-->", "", (Path.cwd() / "CHANGELOG.md").read_text(), flags=re.DOTALL); print(text); start=text.find("_" * 79); (Path.cwd() / "TEMP_CHANGELOG.md").write_text(text[start:text.find("_" * 79, start+1)])'

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: ./TEMP_CHANGELOG.md
          files: |
            dist/*.*

  build_docs:
    name: Build docs
    if: needs.check_version.outputs.is_prerelease == 'false'
    needs: [check_version, build_and_test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # gitpython (used by python/docs/source/conf.py to derive version)
          # needs the full history; the default depth=1 leaves it unable to
          # resolve HEAD's commit object on some refs.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute build metadata
        id: meta
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT=$(git rev-parse --short HEAD)
          DATE=$(date -u +'%Y-%m-%d %H:%M UTC')
          echo "sha=$SHA"          >> "$GITHUB_OUTPUT"
          echo "short=$SHORT"      >> "$GITHUB_OUTPUT"
          echo "date=$DATE"        >> "$GITHUB_OUTPUT"
          echo "Build metadata: $SHORT ($SHA) at $DATE"

      - name: Install system dependencies (Doxygen)
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Fetch doxygen-awesome-css
        run: |
          curl -sSL https://github.com/jothepro/doxygen-awesome-css/archive/refs/tags/v2.3.4.tar.gz | tar -xz
          mv doxygen-awesome-css-2.3.4 doxygen-awesome-css

      - name: Build C++ docs (Doxygen)
        env:
          PROJECT_NUMBER: "${{ steps.meta.outputs.short }} (${{ steps.meta.outputs.date }})"
        run: |
          mkdir -p build/docs/cpp site
          # Append PROJECT_NUMBER override via stdin; Doxygen reads stdin
          # config when invoked with `-` and merges with the file.
          (cat Doxyfile; echo "PROJECT_NUMBER = $PROJECT_NUMBER") | doxygen -
          mv build/docs/cpp site/cpp

      - name: Install Python deps for Sphinx
        run: |
          python -m pip install --upgrade pip
          pip install \
            sphinx sphinx-rtd-theme sphinxcontrib-bibtex gitpython \
            scikit-build-core build numpy eigenpy

      - name: Download built wheel
        uses: actions/download-artifact@v5
        with:
          name: wheels-ubuntu-latest-3.11
          path: dist/

      - name: Install bertini from built wheel
        run: pip install --no-index --find-links dist/ bertini2

      - name: Build Python docs (Sphinx)
        working-directory: python/docs
        env:
          BERTINI_GIT_SHA: ${{ steps.meta.outputs.sha }}
          BERTINI_BUILD_DATE: ${{ steps.meta.outputs.date }}
        run: |
          sphinx-build -b html -W --keep-going source ../../site/python || \
            sphinx-build -b html source ../../site/python

      - name: Add landing page
        env:
          COMMIT_SHA: ${{ steps.meta.outputs.sha }}
          COMMIT_SHORT: ${{ steps.meta.outputs.short }}
          BUILD_DATE: ${{ steps.meta.outputs.date }}
        run: |
          sed \
            -e "s|__COMMIT_SHA__|${COMMIT_SHA}|g" \
            -e "s|__COMMIT_SHORT__|${COMMIT_SHORT}|g" \
            -e "s|__BUILD_DATE__|${BUILD_DATE}|g" \
            doc_resources/landing/index.html > site/index.html
          cp doc_resources/landing/style.css site/style.css

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy_docs:
    name: Deploy to GitHub Pages
    needs:
      - build_docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4