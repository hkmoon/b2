name: Build and test wheels 🐍

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_call:
  workflow_dispatch:
    inputs:
      full_matrix:
        description: 'Run full OS and Python matrix'
        required: false
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  set_matrix:
    name: Set OS matrix
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.matrix.outputs.os }}
      python_versions: ${{ steps.matrix.outputs.python_versions }}
    steps:
      - name: Set OS matrix
        id: matrix
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/develop" || "${{ github.ref }}" == refs/tags/* || "${{ inputs.full_matrix }}" == "true" || "${{ github.event.pull_request.base.ref }}" == "develop" ]]; then
            echo 'os=["ubuntu-latest","macos-15-intel","macos-14"]' >> $GITHUB_OUTPUT
            echo 'python_versions=["3.9","3.10","3.11","3.12","3.13"]' >> $GITHUB_OUTPUT
          else
            echo 'os=["ubuntu-latest","macos-14"]' >> $GITHUB_OUTPUT
            echo 'python_versions=["3.11"]' >> $GITHUB_OUTPUT
          fi

  test_cpp_unix:
    name: C++ tests on ${{ matrix.os }}
    needs: [set_matrix]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.set_matrix.outputs.os) }}
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget libgmp-dev libmpfr-dev libmpc-dev libeigen3-dev libtool

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gmp mpfr libmpc eigen@3

      - name: Build Boost base (Linux)
        if: runner.os == 'Linux'
        run: |
          cd /tmp
          curl -fsSL -o boost_1_90_0.tar.bz2 https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.bz2
          tar xjf boost_1_90_0.tar.bz2
          cd boost_1_90_0
          ./bootstrap.sh --prefix=/tmp/boost-base \
            --with-libraries=serialization,filesystem,graph,chrono,regex,timer,log,thread,test
          ./b2 install -j$(nproc)

      - name: Build Boost base (macOS)
        if: runner.os == 'macOS'
        run: |
          cd /tmp
          curl -fsSL -o boost_1_90_0.tar.bz2 https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.bz2
          tar xjf boost_1_90_0.tar.bz2
          cd boost_1_90_0
          ./bootstrap.sh --prefix=/tmp/boost-base \
            --with-libraries=serialization,filesystem,graph,chrono,regex,timer,log,thread,test
          ./b2 install -j2 hardcode-dll-paths=true dll-path=/tmp/boost-base/lib

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_PREFIX_PATH=/tmp/boost-base \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DENABLE_UNIT_TESTING=ON \
            -DINSTALL_DOCUMENTATION=OFF \
            -DCMAKE_DISABLE_FIND_PACKAGE_Doxygen=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        working-directory: build
        env:
          LD_LIBRARY_PATH: /tmp/boost-base/lib:/tmp/boost-base/lib64
          DYLD_LIBRARY_PATH: /tmp/boost-base/lib
        run: ctest --output-on-failure --parallel $(nproc 2>/dev/null || sysctl -n hw.ncpu)

  test_cpp_windows:
    name: C++ tests on Windows
    runs-on: windows-latest
    env:
      CONDA_PKGS_DIRS: ${{ github.workspace }}\conda_pkgs
    steps:
      - uses: actions/checkout@v5

      - name: Cache conda packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}\conda_pkgs
          key: windows-conda-cpp-${{ hashFiles('environment-win.yml', '.github/workflows/build_and_test.yml') }}
          restore-keys: |
            windows-conda-cpp-
            windows-conda-

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: b2-windows
          environment-file: environment-win.yml
          auto-activate-base: false
          channel-priority: strict

      - name: Configure and build C++ tests
        shell: pwsh
        run: |
          $env:CC = 'clang-cl'
          $env:CXX = 'clang-cl'
          $env:CMAKE_GENERATOR = 'Ninja'
          $env:CMAKE_GENERATOR_PLATFORM = ''
          $env:CMAKE_GENERATOR_TOOLSET = ''
          $env:CMAKE_PREFIX_PATH = "$env:CONDA_PREFIX\Library"

          $boostHeader = "$env:CONDA_PREFIX\Library\include\boost\archive\archive_exception.hpp"
          (Get-Content $boostHeader).Replace('public virtual std::exception', 'public std::exception') | Set-Content $boostHeader

          cmake -B build `
            -DCMAKE_PREFIX_PATH="$env:CONDA_PREFIX\Library" `
            -DBUILD_PYTHON_BINDINGS=OFF `
            -DENABLE_UNIT_TESTING=ON `
            -DINSTALL_DOCUMENTATION=OFF `
            -DCMAKE_DISABLE_FIND_PACKAGE_Doxygen=ON `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Test
        shell: pwsh
        working-directory: build
        run: ctest --output-on-failure --parallel

  build_macos_ubuntu_wheels:
    name: ${{ matrix.os }} Python-${{ matrix.python-version }} wheels 
    needs: [set_matrix]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.set_matrix.outputs.os) }}
        python-version: ${{ fromJson(needs.set_matrix.outputs.python_versions) }}

    steps:
      - uses: actions/checkout@v5
      - name: Cache cibuildwheel + pip + Homebrew
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/cibuildwheel
            ~/Library/Caches/Homebrew
            /tmp/boost_1_90_0.tar.bz2
            /tmp/eigenpy-3.11.0.tar.gz
          key: ${{ runner.os }}-cibw-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'python/pyproject.toml', 'CMakeLists.txt', 'core/CMakeLists.txt', '.github/workflows/build_and_test.yml') }}
          restore-keys: |
            ${{ runner.os }}-cibw-${{ matrix.python-version }}-
            ${{ runner.os }}-cibw-
      - name: Set CIBW_BUILD for this Python version
        shell: bash
        run: |
          PY="${{ matrix.python-version }}"
          PY_TAG="cp${PY//./}"
          echo "CIBW_BUILD=${PY_TAG}-manylinux* ${PY_TAG}-macosx*" >> $GITHUB_ENV
      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        shell: bash
        run: |
          SW_VERS=$(sw_vers -productVersion | cut -d. -f1)
          echo "MACOSX_DEPLOYMENT_TARGET=${SW_VERS}.0" >> $GITHUB_ENV
      - uses: pypa/cibuildwheel@v2.23
        env:
          # Build cp39 through cp313 for both Linux (manylinux) and macOS.
          # Boost.Python and eigenpy are rebuilt per target Python in BEFORE_BUILD
          # so each wheel bundles a matching libboost_python3X.
          CIBW_BUILD: ${{ env.CIBW_BUILD }}
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          # Install system deps + download (but DO NOT build) Boost & eigenpy sources
          # once per container. Boost.Python is ABI-locked to a single CPython version,
          # so it must be rebuilt per target Python in BEFORE_BUILD — building it here
          # against the manylinux2014 system python3 produces a libboost_python39 that
          # all five wheels would then bundle, breaking import on cp310/311/312/313.
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget gmp-devel mpfr-devel libmpc-devel eigen3-devel libtool &&
            cd /tmp &&
            { [ -f eigenpy-3.11.0.tar.gz ] || wget -q https://github.com/stack-of-tasks/eigenpy/releases/download/v3.11.0/eigenpy-3.11.0.tar.gz ; }
          # On macOS, Homebrew's boost-python3 / eigenpy bottles track the current
          # Homebrew default Python (now 3.14), so a cp313 wheel that bundles them
          # imports a libboost_python314.dylib into a 3.13 interpreter and segfaults.
          # Install only the Python-version-independent libs from brew here; download
          # Boost & eigenpy sources to /tmp for the per-Python build in BEFORE_BUILD.
          CIBW_BEFORE_ALL_MACOS: >
            brew install gmp mpfr libmpc eigen@3 &&
            cd /tmp &&
            { [ -f eigenpy-3.11.0.tar.gz ] || curl -fsSL -o eigenpy-3.11.0.tar.gz https://github.com/stack-of-tasks/eigenpy/releases/download/v3.11.0/eigenpy-3.11.0.tar.gz ; }
          # Build Boost and eigenpy fresh against the active per-Python interpreter
          # so each wheel bundles a matching libboost_python3X.
          CIBW_BEFORE_BUILD_LINUX: >
            pip install scikit-build-core numpy scipy &&
            rm -rf /tmp/deps-py && mkdir -p /tmp/deps-py &&
            PY_VER=$(python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')") &&
            PY_INC=$(python -c "import sysconfig; print(sysconfig.get_path('include'))") &&
            PY_LIB=$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR') or '')") &&
            cd /tmp &&
            { [ -f boost_1_90_0.tar.bz2 ] || wget -q https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.bz2 ; } &&
            rm -rf boost_1_90_0 && tar xjf boost_1_90_0.tar.bz2 &&
            cd boost_1_90_0 &&
            ./bootstrap.sh --with-python=$(which python) --prefix=/tmp/deps-py &&
            printf 'using python : %s : %s : %s : %s ;\n' "$PY_VER" "$(which python)" "$PY_INC" "$PY_LIB" > user-config.jam &&
            ./b2 install -j$(nproc) --user-config=user-config.jam python=$PY_VER &&
            cd /tmp &&
            rm -rf eigenpy-3.11.0 && tar zxf eigenpy-3.11.0.tar.gz &&
            cd eigenpy-3.11.0 && mkdir -p bld && cd bld &&
            cmake .. -DCMAKE_PREFIX_PATH=/tmp/deps-py -DCMAKE_INSTALL_PREFIX=/tmp/deps-py -DPython3_EXECUTABLE=$(which python) -DPython3_NumPy_INCLUDE_DIR=$(python -c "import numpy; print(numpy.get_include())") -DBUILD_TESTING=OFF &&
            make -j2 install
          # On macOS, build all Boost components (including Boost.Python) into /tmp/deps-py
          # so delocate sees only one set of dylibs. boost-base is used only for C++ tests.
          CIBW_BEFORE_BUILD_MACOS: >
            pip install scikit-build-core numpy scipy &&
            rm -rf /tmp/deps-py && mkdir -p /tmp/deps-py &&
            PY_VER=$(python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')") &&
            PY_INC=$(python -c "import sysconfig; print(sysconfig.get_path('include'))") &&
            PY_LIB=$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR') or '')") &&
            cd /tmp &&
            { [ -f boost_1_90_0.tar.bz2 ] || curl -fsSL -o boost_1_90_0.tar.bz2 https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.bz2 ; } &&
            rm -rf boost_1_90_0 && tar xjf boost_1_90_0.tar.bz2 &&
            cd boost_1_90_0 &&
            ./bootstrap.sh --with-python=$(which python) --prefix=/tmp/deps-py &&
            printf 'using python : %s : %s : %s : %s ;\n' "$PY_VER" "$(which python)" "$PY_INC" "$PY_LIB" > user-config.jam &&
            ./b2 install -j$(sysctl -n hw.ncpu) --user-config=user-config.jam python=$PY_VER hardcode-dll-paths=true dll-path=/tmp/deps-py/lib &&
            cd /tmp &&
            rm -rf eigenpy-3.11.0 && tar zxf eigenpy-3.11.0.tar.gz &&
            cd eigenpy-3.11.0 && mkdir -p bld && cd bld &&
            cmake .. -DCMAKE_PREFIX_PATH="/tmp/deps-py;/opt/homebrew" -DCMAKE_INSTALL_PREFIX=/tmp/deps-py -DPython3_EXECUTABLE=$(which python) -DPython3_NumPy_INCLUDE_DIR=$(python -c "import numpy; print(numpy.get_include())") -DBUILD_TESTING=OFF &&
            make -j2 install
          CIBW_BEFORE_BUILD: "pip install scikit-build-core numpy"
          CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH=/tmp/deps-py/lib:/tmp/deps-py/lib64:$LD_LIBRARY_PATH CMAKE_PREFIX_PATH=/tmp/deps-py"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET CMAKE_PREFIX_PATH=/tmp/deps-py:/opt/homebrew DYLD_FALLBACK_LIBRARY_PATH=/tmp/deps-py/lib:/opt/homebrew/lib"

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_windows_wheels:
    name: Windows Python-${{ matrix.python-version }} wheels 
    runs-on: windows-latest
    env:
      CONDA_PKGS_DIRS: ${{ github.workspace }}\conda_pkgs
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Cache conda packages + pip
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}\conda_pkgs
            ~\AppData\Local\pip\Cache
          key: windows-conda-${{ matrix.python-version }}-${{ hashFiles('environment-win.yml', '.github/workflows/build_and_test.yml') }}
          restore-keys: |
            windows-conda-${{ matrix.python-version }}-
            windows-conda-
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: b2-windows
          environment-file: environment-win.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
          channel-priority: strict

      - name: Build Windows
        shell: pwsh
        run: |
          conda install -y python=${{ matrix.python-version }} --update-deps
          conda info
          conda list
          $env:CC = 'clang-cl'
          $env:CXX = 'clang-cl'
          $env:CMAKE_GENERATOR = 'Ninja'
          $env:CMAKE_GENERATOR_PLATFORM = ''
          $env:CMAKE_GENERATOR_TOOLSET = ''
          $env:CMAKE_PREFIX_PATH = "$env:CONDA_PREFIX\Library"

          $boostHeader = "$env:CONDA_PREFIX\Library\include\boost\archive\archive_exception.hpp"
          (Get-Content $boostHeader).Replace('public virtual std::exception', 'public std::exception') | Set-Content $boostHeader

          cd ${{ github.workspace }}
          pip install build delvewheel
          python -m build --wheel --no-isolation

          $wheelPath = (Get-ChildItem dist/*.whl | Select-Object -First 1).FullName
          if (-not $wheelPath) { Write-Error "No wheel found in dist/"; exit 1 }
          delvewheel repair $wheelPath -w repaired/ --add-path "$env:CONDA_PREFIX\Library\bin"
          Remove-Item dist/*.whl
          Move-Item repaired/*.whl dist/

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: ./dist/*.whl

  test_wheels_linux_macos:
    name: Test wheels on ${{ matrix.os }} / py${{ matrix.python-version }}
    needs: [set_matrix, build_macos_ubuntu_wheels]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.set_matrix.outputs.os) }}
        python-version: ${{ fromJson(needs.set_matrix.outputs.python_versions) }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels artifact
        uses: actions/download-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/

      - name: Install wheel
        run: |
          pip install numpy
          pip install --no-index --find-links dist/ bertini2

      - name: Run Python tests
        run: |
          pip install pytest
          python -m pytest python/test/ -v

  test_wheels_windows:
    name: Test wheel on windows-${{ matrix.python-version }}
    needs: [build_windows_wheels]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v5

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: b2-windows
          environment-file: environment-win.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
          channel-priority: strict

      - name: Download wheels artifact
        uses: actions/download-artifact@v5
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: dist/

      - name: Install wheel and run tests
        shell: pwsh
        run: |
          conda info
          conda install -y python=${{ matrix.python-version }} --update-deps
          $py = "C:\Miniconda\envs\b2-windows\python.exe"
          & $py -m pip install --no-index --find-links dist/ bertini2
          & $py -m pip install pytest
          & $py -m pytest python/test/ -v