name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on: push

jobs:
  build:
    name: Build Binaries for ${{ matrix.os }}-${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [
          '3.10',
          'pypy-3.9',
        ]
        exclude:
          - os: windows-latest
            python-version: 'pypy-3.9'
          - os: macos-latest
            python-version: 'pypy-3.9'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install necessary dependencies
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp3-dev libmpfr-dev libmpc-dev libeigen3-dev automake autoconf libtool build-essential wget tar    
          pip install numpy scipy
          pip install twine wheel setuptools
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Boost (Posix)
        id: install-boost
        uses: MarkusJx/install-boost@v2
        with:
          # REQUIRED: Specify the required boost version
          # A list of supported versions can be found here:
          # https://github.com/MarkusJx/prebuilt-boost/blob/main/versions-manifest.json
          boost_version: 1.87.0
          # OPTIONAL: Specify a custom install location
          boost_install_dir: build
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
      - name: Checkout eigenpy (Posix)
        uses: actions/checkout@v2
        with:
          repository: stack-of-tasks/eigenpy
          path: './eigenpy'
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
      - name: Install eigenpy (Posix)
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        run: |
          pip install numpy
          cd ./eigenpy
          mkdir build
          cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=../../build
          make -j 4
          make install
      - name: Build Executables (Posix)
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        run: |
          cd core/build
          cmake .. -DCMAKE_INSTALL_PREFIX=../../build
          make -j 4
          make install
          cd ../..
            
          cd python/build
          cmake .. -DCMAKE_INSTALL_PREFIX=../../build
          make -j 4
          make install
          python3 -m pip install -e .
          python3 setup.py bdist

      - name: Upload Builds
        uses: actions/upload-artifact@v3
        with:
          name: built-binary
          path: |
            dist/*.whl
            dist/*.tar.gz
            build/*.exe
            build/*.bin
