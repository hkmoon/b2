name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on:
  push:
    branches:
      - 'ci'

jobs:
  build:
    name: Build Binaries for ${{ matrix.os }}-${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [
          '3.12.10',
          'pypy-3.12.10',
        ]
        exclude:
          - os: windows-latest
            python-version: 'pypy-3.12.10'
          - os: macos-latest
            python-version: 'pypy-3.12.10'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install necessary dependencies (Posix)
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp3-dev libmpfr-dev libmpc-dev libeigen3-dev
      - name: conda-ubuntu
        uses: conda-incubator/setup-miniconda@v3
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        with:
          activate-environment: b2-ubuntu
          environment-file: environment.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
      - name: Build (Posix)
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        shell: bash -el {0}
        run: |
          conda info
          conda list
          
          cd ${{github.workspace}}/core
          mkdir build
          cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/build -DCMAKE_PREFIX_PATH=$CONDA_PREFIX
          make -j 4
          make install

          cd ${{github.workspace}}/python
          mkdir build
          cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/build -DCMAKE_PREFIX_PATH=$CONDA_PREFIX
          make -j 4
          make install

          cd ..
          python3 setup.py bdist_wheel
      - name: conda-windows
        uses: conda-incubator/setup-miniconda@v3
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'windows') }}
        with:
          activate-environment: b2-windows
          environment-file: environment-win.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
      - name: Build Windows
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'windows')}}
        shell: powershell
        run: |
          conda info
          conda list
          
          cd core
          mkdir build
          cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=..\..\build -DCMAKE_PREFIX_PATH=C:\Miniconda\envs\b2-windows\Library
          cmake --build .
          cmake --install .

          cd ..\..\python
          mkdir build
          cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=..\..\build -DCMAKE_PREFIX_PATH=C:\Miniconda\envs\b2-windows\Library
          cmake --build .
          cmake --install .

          cd ..
          python3 -m pip install build
          python3 -m build --wheel
          python3 setup.py bdist_wheel
      - name: Build MacOS
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'macos') }}
        run: |
          brew install gmp
          brew install mpfr
          brew install libmpc
          brew install eigen
          brew install eigenpy
          brew install boost
          brew install boost-python3
          brew install python-setuptools
          
          pip install numpy scipy wheel
          cd ${{github.workspace}}/core
          mkdir build
          cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/build -DCMAKE_PREFIX_PATH=$CONDA_PREFIX
          make -j 4
          make install

          cd ${{github.workspace}}/python
          mkdir build
          cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/build -DCMAKE_PREFIX_PATH=$CONDA_PREFIX
          make -j 4
          make install

          cd ..
          python3 setup.py bdist_wheel
      - name: Upload Builds
        uses: actions/upload-artifact@v4
        with:
          name: built-binary-${{ matrix.os }}
          path: |
            ${{github.workspace}}/python/dist/*.whl
            ${{github.workspace}}/python/dist/*.tar.gz
            ${{github.workspace}}/python/dist/*.zip
            ${{github.workspace}}/python/build/*.exe
            ${{github.workspace}}/python/build/*.bin
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')  # only publish to release on tag pushes
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Get Newest Changelog
        run: |
          python3 -c "import re; from pathlib import Path; text=re.sub('<!--(.*?)-->', '', (Path.cwd() / 'CHANGELOG.md').read_text(), flags=re.DOTALL); start=text.find('_' * 79); (Path.cwd() / 'TEMP_CHANGELOG.md').write_text(text[start:text.find('_' * 79, start+1)])"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          body_path: ./TEMP_CHANGELOG.md
          files: |
            dist/*.*

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pybertini  # Replace <package-name> with your PyPI project name
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

