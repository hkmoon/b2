name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on: push

jobs:
  build:
    name: Build Binaries for ${{ matrix.os }}-${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [
          '3.10',
          'pypy-3.9',
        ]
        exclude:
          - os: windows-latest
            python-version: 'pypy-3.9'
          - os: macos-latest
            python-version: 'pypy-3.9'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install necessary dependencies (Posix)
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp3-dev libmpfr-dev libmpc-dev libeigen3-dev automake autoconf libtool build-essential libboost-all-dev tar
          pip install setuptools
      - name: Install necessary dependencies (MacOS)
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'macos') }}
        run: |
          brew install gmp
          brew install mpfr
          brew install libmpc
          brew install eigen
          brew install eigenpy
          brew install boost
          brew install boost-python3
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
#      - name: Install Boost
#        if: ${{ !startsWith(matrix.python-version, 'pypy') }}
#        id: install-boost
#        uses: MarkusJx/install-boost@v2
#        with:
#          boost_version: 1.87.0
#      - name: Checkout and install eigen
#        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'windows') }}
#        run: |
#          git clone https://gitlab.com/libeigen/eigen.git
#          cd eigen
#          mkdir build
#          cd build
#          cmake .. -DCMAKE_PREFIX_PATH=${{github.workspace}}/boost/boost
#          make -j 4
#          make install
      - name: Checkout eigenpy
        uses: actions/checkout@v2
        with:
          repository: stack-of-tasks/eigenpy
          path: './eigenpy'
      - name: Install eigenpy
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        run: |
          pip install numpy scipy
          cd eigenpy
          mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=${{github.workspace}}/boost/boost -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/b2/build
          make -j 4
          make install
      - name: Build Executables
        if: ${{ !startsWith(matrix.python-version, 'pypy') && !startsWith(matrix.os, 'windows') }}
        run: |
          cd ${{github.workspace}}/core
          mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=${{github.workspace}}/boost/boost -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/b2/build
          make -j 4
          make install
            
          cd ${{github.workspace}}/python
          mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=${{github.workspace}}/boost/boost -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/b2/build
          make -j 4
          make install
          
          cd ..
          pip install twine wheel
          python3 -m pip install -e .
          python3 setup.py bdist

      - name: Upload Builds
        uses: actions/upload-artifact@v3
        with:
          name: built-binary
          path: |
            ${{github.workspace}}/python/dist/*.whl
            ${{github.workspace}}/python/dist/*.tar.gz
            ${{github.workspace}}/python/build/*.exe
            ${{github.workspace}}/python/build/*.bin
