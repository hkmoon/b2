name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on:
  push:
    branches:
      - 'develop'
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build Binaries for ${{ matrix.os }}-${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [
          '3.11.12',
          'pypy-3.11.12',
        ]
        exclude:
          - os: windows-latest
            python-version: 'pypy-3.11.12'
          - os: macos-latest
            python-version: 'pypy-3.11.12'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install necessary dependencies (Posix)
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp3-dev libmpfr-dev libmpc-dev libeigen3-dev
      - name: conda-ubuntu
        uses: conda-incubator/setup-miniconda@v3
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        with:
          activate-environment: b2-ubuntu
          environment-file: environment.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
      - name: Build (Posix)
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'ubuntu') }}
        shell: bash -el {0}
        run: |
          conda info
          conda list
                   
          cd ${{github.workspace}}
          mkdir bld
          python3 -m build --wheel
          
          for whl in dist/*.whl; do
            auditwheel -v repair $whl -w dist/ --plat manylinux_2_39_x86_64
            rm $whl
          done
          
          ls -alF dist/
      - name: conda-windows
        uses: conda-incubator/setup-miniconda@v3
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'windows') }}
        with:
          activate-environment: b2-windows
          environment-file: environment-win.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
      - name: Build Windows
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'windows')}}
        shell: powershell
        #          https://stackoverflow.com/questions/79073953/clang-undefined-symbol-boostarchivearchive-exception
        run: |
          conda info
          conda list

          cd ${{github.workspace}}
          mkdir bld
          cd bld
          pip3 install build
          $env:CC='clang-cl'
          $env:CXX='clang-cl'

          (Get-Content C:\Miniconda\envs\b2-windows\Library\include\boost\archive\archive_exception.hpp).Replace('public virtual std::exception', 'public std::exception') | Set-Content C:\Miniconda\envs\b2-windows\Library\include\boost\archive\archive_exception.hpp
          
          $env:CMAKE_PREFIX_PATH='C:\Miniconda\envs\b2-windows\Library'
          
          cmake -G Ninja ..
          cmake --build .
               
          cd ..
          python -m build --wheel --no-isolation
      - name: Build MacOS
        if: ${{ !startsWith(matrix.python-version, 'pypy') && startsWith(matrix.os, 'macos') }}
        run: |
          brew install gmp
          brew install mpfr
          brew install libmpc
          brew install eigen
          brew install eigenpy
          brew install boost
          brew install boost-python3
          brew install python-setuptools
          
          python3 -m venv venv
          source venv/bin/activate
          pip install numpy scipy wheel build
          cd ${{github.workspace}}
          mkdir build
          cd build
          cmake ..
          make -j 4

          cd ..
          python3 -m build --wheel
      - name: Upload Builds
        uses: actions/upload-artifact@v4
        with:
          name: built-binary-${{ matrix.os }}
          path: |
            ${{github.workspace}}/dist/*.whl
            ${{github.workspace}}/dist/*.tar.gz
            ${{github.workspace}}/dist/*.zip
            ${{github.workspace}}/build/*.exe
            ${{github.workspace}}/build/*.bin

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    needs:
      - build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/pybertini

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pybertini  # Replace <package-name> with your PyPI project name
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    if: startsWith(github.ref, 'refs/tags/')  # only publish to release on tag pushes
    needs:
      - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.whl

      - name: Get Newest Changelog
        run: |
          python3 -c "import re; from pathlib import Path; text=re.sub('<!--(.*?)-->', '', (Path.cwd() / 'CHANGELOG.md').read_text(), flags=re.DOTALL); start=text.find('_' * 79); (Path.cwd() / 'TEMP_CHANGELOG.md').write_text(text[start:text.find('_' * 79, start+1)])"
          cat TEMP_CHANGELOG.md

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: ./TEMP_CHANGELOG.md
          files: |
            dist/*.*
