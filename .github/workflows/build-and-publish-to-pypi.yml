name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  pull_request:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4
      - name: Cache cibuildwheel + pip + Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/cibuildwheel
            ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-cibw-${{ hashFiles('pyproject.toml', 'python/pyproject.toml', 'CMakeLists.txt', 'core/CMakeLists.txt', '.github/workflows/build-and-publish-to-pypi.yml') }}
          restore-keys: |
            ${{ runner.os }}-cibw-
      - uses: pypa/cibuildwheel@v2.23
        env:
          # Build cp39 through cp313 for both Linux (manylinux) and macOS.
          # Boost.Python and eigenpy are rebuilt per target Python in BEFORE_BUILD
          # so each wheel bundles a matching libboost_python3X.
          CIBW_BUILD: "cp39-manylinux* cp310-manylinux* cp311-manylinux* cp312-manylinux* cp313-manylinux* cp39-macosx* cp310-macosx* cp311-macosx* cp312-macosx* cp313-macosx*"
          CIBW_SKIP: "*-musllinux_* *-manylinux_i686"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          # Install system deps + download (but DO NOT build) Boost & eigenpy sources
          # once per container. Boost.Python is ABI-locked to a single CPython version,
          # so it must be rebuilt per target Python in BEFORE_BUILD — building it here
          # against the manylinux2014 system python3 produces a libboost_python39 that
          # all five wheels would then bundle, breaking import on cp310/311/312/313.
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget gmp-devel mpfr-devel libmpc-devel eigen3-devel libtool &&
            cd /tmp &&
            { [ -f boost_1_87_0.tar.bz2 ] || wget -q https://archives.boost.io/release/1.87.0/source/boost_1_87_0.tar.bz2 ; } &&
            { [ -f eigenpy-3.11.0.tar.gz ] || wget -q https://github.com/stack-of-tasks/eigenpy/releases/download/v3.11.0/eigenpy-3.11.0.tar.gz ; }
          # On macOS, Homebrew's boost-python3 / eigenpy bottles track the current
          # Homebrew default Python (now 3.14), so a cp313 wheel that bundles them
          # imports a libboost_python314.dylib into a 3.13 interpreter and segfaults.
          # Install only the Python-version-independent libs from brew here; download
          # Boost & eigenpy sources to /tmp for the per-Python build in BEFORE_BUILD.
          CIBW_BEFORE_ALL_MACOS: >
            brew install gmp mpfr libmpc eigen@3 &&
            cd /tmp &&
            { [ -f boost_1_87_0.tar.bz2 ] || curl -fsSL -o boost_1_87_0.tar.bz2 https://archives.boost.io/release/1.87.0/source/boost_1_87_0.tar.bz2 ; } &&
            { [ -f eigenpy-3.11.0.tar.gz ] || curl -fsSL -o eigenpy-3.11.0.tar.gz https://github.com/stack-of-tasks/eigenpy/releases/download/v3.11.0/eigenpy-3.11.0.tar.gz ; }
          # Build Boost.Python and eigenpy fresh against the active per-Python interpreter
          # so the resulting libboost_python3X.so / libeigenpy.so match the wheel's ABI.
          CIBW_BEFORE_BUILD_LINUX: >
            pip install scikit-build-core numpy scipy &&
            rm -rf /tmp/deps-py && mkdir -p /tmp/deps-py &&
            PY_VER=$(python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')") &&
            PY_INC=$(python -c "import sysconfig; print(sysconfig.get_path('include'))") &&
            PY_LIB=$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR') or '')") &&
            cd /tmp &&
            rm -rf boost_1_87_0 && tar xjf boost_1_87_0.tar.bz2 &&
            cd boost_1_87_0 &&
            ./bootstrap.sh --with-python=$(which python) --prefix=/tmp/deps-py &&
            printf 'using python : %s : %s : %s : %s ;\n' "$PY_VER" "$(which python)" "$PY_INC" "$PY_LIB" > user-config.jam &&
            ./b2 install -j$(nproc) --user-config=user-config.jam python=$PY_VER &&
            cd /tmp &&
            rm -rf eigenpy-3.11.0 && tar zxf eigenpy-3.11.0.tar.gz &&
            cd eigenpy-3.11.0 && mkdir -p bld && cd bld &&
            cmake .. -DCMAKE_PREFIX_PATH=/tmp/deps-py -DCMAKE_INSTALL_PREFIX=/tmp/deps-py -DPython3_EXECUTABLE=$(which python) -DPython3_NumPy_INCLUDE_DIR=$(python -c "import numpy; print(numpy.get_include())") -DBUILD_TESTING=OFF &&
            make -j$(nproc) install
          CIBW_BEFORE_BUILD_MACOS: >
            pip install scikit-build-core numpy scipy &&
            rm -rf /tmp/deps-py && mkdir -p /tmp/deps-py &&
            PY_VER=$(python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')") &&
            PY_INC=$(python -c "import sysconfig; print(sysconfig.get_path('include'))") &&
            PY_LIB=$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR') or '')") &&
            cd /tmp &&
            rm -rf boost_1_87_0 && tar xjf boost_1_87_0.tar.bz2 &&
            cd boost_1_87_0 &&
            ./bootstrap.sh --with-python=$(which python) --prefix=/tmp/deps-py &&
            printf 'using python : %s : %s : %s : %s ;\n' "$PY_VER" "$(which python)" "$PY_INC" "$PY_LIB" > user-config.jam &&
            ./b2 install -j$(sysctl -n hw.ncpu) --user-config=user-config.jam python=$PY_VER hardcode-dll-paths=true dll-path=/tmp/deps-py/lib &&
            cd /tmp &&
            rm -rf eigenpy-3.11.0 && tar zxf eigenpy-3.11.0.tar.gz &&
            cd eigenpy-3.11.0 && mkdir -p bld && cd bld &&
            cmake .. -DCMAKE_PREFIX_PATH="/tmp/deps-py;/opt/homebrew" -DCMAKE_INSTALL_PREFIX=/tmp/deps-py -DPython3_EXECUTABLE=$(which python) -DPython3_NumPy_INCLUDE_DIR=$(python -c "import numpy; print(numpy.get_include())") -DBUILD_TESTING=OFF &&
            make -j$(sysctl -n hw.ncpu) install
          CIBW_BEFORE_BUILD: "pip install scikit-build-core numpy"
          CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH=/tmp/deps-py/lib:/tmp/deps-py/lib64:$LD_LIBRARY_PATH CMAKE_PREFIX_PATH=/tmp/deps-py"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=14.0 CMAKE_PREFIX_PATH=/tmp/deps-py:/opt/homebrew DYLD_FALLBACK_LIBRARY_PATH=/tmp/deps-py/lib:/opt/homebrew/lib"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_windows:
    name: Build wheel on windows-${{ matrix.python-version }}
    runs-on: windows-latest
    env:
      CONDA_PKGS_DIRS: ${{ github.workspace }}\conda_pkgs
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Cache conda packages + pip
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\conda_pkgs
            ~\AppData\Local\pip\Cache
          key: windows-conda-${{ matrix.python-version }}-${{ hashFiles('environment-win.yml', '.github/workflows/build-and-publish-to-pypi.yml') }}
          restore-keys: |
            windows-conda-${{ matrix.python-version }}-
            windows-conda-
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: b2-windows
          environment-file: environment-win.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
      - name: Build Windows
        shell: pwsh
        # https://stackoverflow.com/questions/79073953/clang-undefined-symbol-boostarchivearchive-exception
        run: |
          conda info
          conda list

          $env:CC='clang-cl'
          $env:CXX='clang-cl'
          $env:CMAKE_GENERATOR='Ninja'
          $env:CMAKE_PREFIX_PATH="$env:CONDA_PREFIX\Library"

          # Patch boost header to fix clang-cl linker error
          $boostHeader = "$env:CONDA_PREFIX\Library\include\boost\archive\archive_exception.hpp"
          (Get-Content $boostHeader).Replace('public virtual std::exception', 'public std::exception') | Set-Content $boostHeader

          cd ${{github.workspace}}
          pip install build delvewheel
          python -m build --wheel --no-isolation

          # Bundle all dependent DLLs (boost, gmp, eigenpy, etc.) into the wheel
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          delvewheel repair $wheel.FullName -w repaired/ --add-path "$env:CONDA_PREFIX\Library\bin"
          Remove-Item dist/*.whl
          Move-Item repaired/*.whl dist/
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: ./dist/*.whl

  test_wheels_linux_macos:
    name: Test wheels on ${{ matrix.os }} / py${{ matrix.python-version }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-${{ matrix.os }}-*
          merge-multiple: true
          path: dist/

      - name: Install wheel
        run: |
          pip install --find-links dist/ bertini

      - name: Run Python tests
        run: |
          pip install pytest
          pytest python/test/ -v

  test_wheels_windows:
    name: Test wheel on windows-${{ matrix.python-version }}
    needs: build_windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: b2-windows
          environment-file: environment-win.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false

      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: dist/

      - name: Install wheel and run tests
        shell: pwsh
        run: |
          pip install --no-index --find-links dist/ bertini
          pip install pytest
          pytest python/test/ -v

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    needs:
      - test_wheels_linux_macos
      - test_wheels_windows
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/bertini

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
      - test_wheels_linux_macos
      - test_wheels_windows
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bertini
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    if: startsWith(github.ref, 'refs/tags/')  # only publish to release on tag pushes
    needs:
      - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.whl

      - name: Get Newest Changelog
        run: |
          python -c 'import re; from pathlib import Path; text=re.sub("<!--(.*?)-->", "", (Path.cwd() / "CHANGELOG.md").read_text(), flags=re.DOTALL); print(text); start=text.find("_" * 79); (Path.cwd() / "TEMP_CHANGELOG.md").write_text(text[start:text.find("_" * 79, start+1)])'

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: ./TEMP_CHANGELOG.md
          files: |
            dist/*.*
