name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on:
  push:
    branches:
      - 'develop'
    tags:
      - 'v*.*.*'

jobs:
  build-linux:
    name: Build manylinux wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.16.5

      - name: Build wheels
        env:
          # Build for Python 3.8, 3.10, 3.11 on x86_64 with manylinux_2_28 and manylinux2014
          CIBW_BUILD: cp38-manylinux_x86_64 cp310-manylinux_x86_64 cp311-manylinux_x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: |
            # Install system dependencies
            yum install -y gmp-devel mpfr-devel libmpc-devel wget tar make gcc-c++

            # Install Eigen3
            wget https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz
            tar xzf eigen-3.4.0.tar.gz
            cd eigen-3.4.0
            mkdir build && cd build
            cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
            make install
            cd ../..

            # Install Boost with Python support
            wget https://boostorg.jfrog.io/artifactory/main/release/1.83.0/source/boost_1_83_0.tar.gz
            tar xzf boost_1_83_0.tar.gz
            cd boost_1_83_0
            ./bootstrap.sh --with-python=python3
            ./b2 install --prefix=/usr/local --with-python variant=release link=shared threading=multi
            cd ..
          CIBW_BEFORE_BUILD: |
            pip install numpy eigenpy scikit-build-core
          CIBW_ENVIRONMENT: CMAKE_PREFIX_PATH=/usr/local LD_LIBRARY_PATH=/usr/local/lib
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair --plat manylinux_2_28_x86_64 -w {dest_dir} {wheel}"
          CIBW_SKIP: "*-musllinux_* pp* *-manylinux_i686"
        run: python -m cibuildwheel --output-dir dist

      - name: Upload Builds
        uses: actions/upload-artifact@v4
        with:
          name: built-binary-linux
          path: dist/*.whl

  build-macos:
    name: Build macOS wheels
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          brew install gmp mpfr libmpc eigen eigenpy boost boost-python3
          pip install numpy scipy wheel build

      - name: Build wheel
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j 4
          cd ..
          python -m build --wheel

      - name: Upload Builds
        uses: actions/upload-artifact@v4
        with:
          name: built-binary-macos-${{ matrix.python-version }}
          path: dist/*.whl

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    needs:
      - build-linux
      - build-macos
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/pybertini

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pybertini  # Replace <package-name> with your PyPI project name
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    if: startsWith(github.ref, 'refs/tags/')  # only publish to release on tag pushes
    needs:
      - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: >-
            ./dist/*.whl

      - name: Get Newest Changelog
        run: |
          python -c 'import re; from pathlib import Path; text=re.sub("<!--(.*?)-->", "", (Path.cwd() / "CHANGELOG.md").read_text(), flags=re.DOTALL); print(text); start=text.find("_" * 79); (Path.cwd() / "TEMP_CHANGELOG.md").write_text(text[start:text.find("_" * 79, start+1)])'

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: ./TEMP_CHANGELOG.md
          files: |
            dist/*.*
