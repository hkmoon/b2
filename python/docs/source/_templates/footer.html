{# Override sphinx_rtd_theme footer to append build metadata. #}
{% extends "!footer.html" %}

{% block extrafooter %}
  {{ super() }}
  {% if commit_sha %}
  <div class="build-info">
    <p>
      Built from
      <a href="https://github.com/hkmoon/b2/commit/{{ commit_sha }}"><code>{{ commit_short }}</code></a>
      {% if build_date %}on {{ build_date }}{% endif %}.
    </p>
  </div>
  {% endif %}
{% endblock %}
